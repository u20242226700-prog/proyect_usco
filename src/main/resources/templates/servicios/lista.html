<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{servicios.titulo}">Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-arrow-left-right me-2"></i>HabiliUSCO
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/home}">Inicio</a>
            <a class="btn btn-outline-light btn-sm ms-2" th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="#{servicios.titulo}">Catálogo de Servicios</h2>
        <button class="btn btn-primary" th:text="#{servicios.nuevo}">Publicar Servicio</button>
    </div>
    <div class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Inicia sesión para ver y publicar servicios.
    </div>
</div>
</body>
</html>
