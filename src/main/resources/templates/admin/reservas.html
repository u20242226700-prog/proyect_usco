<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reservas - Admin HabiliUSCO</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar">
    <div class="logo">Habili<span>USCO</span></div>
    <nav class="admin-nav">
      <a href="/admin" class="admin-nav-link">📊 Dashboard</a>
      <a href="/admin/usuarios" class="admin-nav-link">👥 Usuarios</a>
      <a href="/admin/servicios" class="admin-nav-link">🛠 Servicios</a>
      <a href="/admin/reservas" class="admin-nav-link active">📅 Reservas</a>
      <a href="/admin/logs" class="admin-nav-link">📋 Logs</a>
      <hr style="border-color:rgba(255,255,255,0.1); margin:1rem 0">
      <a href="/portal" class="admin-nav-link">🏠 Portal</a>
      <a href="#" class="admin-nav-link" onclick="logout()">🚪 Salir</a>
    </nav>
  </div>
  <div class="admin-content">
    <h1 style="font-size:1.5rem; font-weight:900; margin-bottom:1.5rem">📅 Todas las Reservas</h1>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Servicio</th><th>Solicitante</th><th>Proveedor</th><th>Fecha</th><th>Precio Propuesto</th><th>Precio Acordado</th><th>Estado</th></tr></thead>
          <tbody>
            <tr th:each="r : ${reservas}">
              <td style="font-size:0.8rem; color:var(--gray)">#<span th:text="${r.id}"></span></td>
              <td style="font-weight:600" th:text="${r.servicio.titulo}"></td>
              <td th:text="${r.solicitante.nombreCompleto}"></td>
              <td th:text="${r.servicio.usuario.nombreCompleto}"></td>
              <td th:text="${r.fechaReserva}"></td>
              <td th:text="${r.precioPropuesto != null ? '$' + r.precioPropuesto : '-'}"></td>
              <td th:text="${r.precioAcordado != null ? '$' + r.precioAcordado : '-'}"></td>
              <td><span class="status-badge" th:classappend="'status-' + ${r.estado}" th:text="${r.estado}"></span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(reservas)}">
              <td colspan="8" style="text-align:center; color:var(--gray); padding:2rem">No hay reservas aún</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
