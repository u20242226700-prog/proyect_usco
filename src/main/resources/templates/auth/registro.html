<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - HabiliUSCO</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-logo">Habili<span>USCO</span></div>
    <div class="auth-title">Crear cuenta</div>
    <div class="auth-sub">Únete a la comunidad universitaria de servicios</div>

    <div id="registroError" class="alert alert-danger" style="display:none"></div>
    <div id="registroSuccess" class="alert alert-success" style="display:none">
      ✅ ¡Cuenta creada! Redirigiendo al login...
    </div>

    <form id="registroForm">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input id="nombreCompleto" type="text" class="form-control" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label class="form-label">Usuario *</label>
          <input id="username" type="text" class="form-control" placeholder="usuario123" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email institucional *</label>
        <input id="email" type="email" class="form-control" placeholder="nombre@usco.edu.co" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña *</label>
        <input id="password" type="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
        <div class="form-group">
          <label class="form-label">Facultad</label>
          <select id="facultad" class="form-control">
            <option value="">Selecciona...</option>
            <option>Ingeniería</option>
            <option>Ciencias Sociales</option>
            <option>Ciencias de la Salud</option>
            <option>Educación</option>
            <option>Ciencias Jurídicas</option>
            <option>Economía y Administración</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Programa</label>
          <input id="programa" type="text" class="form-control" placeholder="Tu programa">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input id="telefono" type="tel" class="form-control" placeholder="300 000 0000">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Crear cuenta
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--gray)">
      ¿Ya tienes cuenta? <a href="/login" style="color:var(--primary); font-weight:600">Inicia sesión</a>
    </p>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
