<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión - HabiliUSCO</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Habili<span>USCO</span></div>
    <div class="auth-title">¡Bienvenido de vuelta!</div>
    <div class="auth-sub">Ingresa tus credenciales para continuar</div>

    <div id="loginError" class="alert alert-danger" style="display:none"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input id="username" type="text" class="form-control" placeholder="tu_usuario" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
        Iniciar Sesión
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--gray)">
      ¿No tienes cuenta? <a href="/registro" style="color:var(--primary); font-weight:600">Regístrate gratis</a>
    </p>

    <div style="margin-top:1.5rem; padding:1rem; background:var(--light); border-radius:8px; font-size:0.82rem; color:var(--gray)">
      <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; daniel / 123456
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
