# ============================================
# HabiliUSCO - Configuracion principal
# ============================================

spring.application.name=hibrido
server.port=8086

# --- PostgreSQL (usuario, servicios, intercambios) ---
spring.datasource.primary.jdbc-url=jdbc:postgresql://localhost:5432/usco_hibrido_pg
spring.datasource.primary.username=postgres
spring.datasource.primary.password=1234
spring.datasource.primary.driver-class-name=org.postgresql.Driver
spring.datasource.primary.hikari.maximum-pool-size=5

# --- MySQL (auditoría, logs) ---
spring.datasource.secondary.jdbc-url=jdbc:mysql://localhost:3306/usco_hibrido_mysql?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.secondary.username=root
spring.datasource.secondary.password=
spring.datasource.secondary.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.secondary.hikari.maximum-pool-size=5

# --- JPA ---
spring.jpa.open-in-view=false

# --- JWT ---
app.jwt.secret=usco-hibrido-secret-key-2024-daniel-jimenez-32chars
app.jwt.expiration-ms=86400000

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- i18n ---
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# --- Logging ---
logging.level.com.uscoproyecto=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Static resources - serve uploaded files
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# SSL / HTTPS
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=habiliusco
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=Daniel Jimenez
