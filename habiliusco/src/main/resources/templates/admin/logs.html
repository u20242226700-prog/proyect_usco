<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Logs - Admin HabiliUSCO</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar">
    <div class="logo">Habili<span>USCO</span></div>
    <nav class="admin-nav">
      <a href="/admin" class="admin-nav-link">📊 Dashboard</a>
      <a href="/admin/usuarios" class="admin-nav-link">👥 Usuarios</a>
      <a href="/admin/servicios" class="admin-nav-link">🛠 Servicios</a>
      <a href="/admin/reservas" class="admin-nav-link">📅 Reservas</a>
      <a href="/admin/logs" class="admin-nav-link active">📋 Logs</a>
      <hr style="border-color:rgba(255,255,255,0.1); margin:1rem 0">
      <a href="/portal" class="admin-nav-link">🏠 Portal</a>
      <a href="#" class="admin-nav-link" onclick="logout()">🚪 Salir</a>
    </nav>
  </div>
  <div class="admin-content">
    <h1 style="font-size:1.5rem; font-weight:900; margin-bottom:1.5rem">📋 Logs del Sistema (MySQL)</h1>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Fecha</th><th>Acción</th><th>Entidad</th><th>ID Entidad</th><th>Usuario</th><th>IP</th><th>Nivel</th><th>Detalle</th></tr></thead>
          <tbody>
            <tr th:each="log : ${logs}">
              <td style="font-size:0.8rem; white-space:nowrap" th:text="${#temporals.format(log.fechaEvento,'dd/MM/yyyy HH:mm')}"></td>
              <td style="font-weight:600; font-size:0.85rem" th:text="${log.accion}"></td>
              <td th:text="${log.entidad}"></td>
              <td th:text="${log.entidadId}"></td>
              <td th:text="${log.usuarioUsername}"></td>
              <td style="font-size:0.8rem; color:var(--gray)" th:text="${log.ipAddress}"></td>
              <td>
                <span class="status-badge"
                      th:classappend="${log.nivel == 'ERROR'} ? 'status-RECHAZADA' : (${log.nivel == 'WARN'} ? 'status-NEGOCIANDO' : 'status-ACTIVO')"
                      th:text="${log.nivel}"></span>
              </td>
              <td style="font-size:0.82rem; color:var(--gray)" th:text="${log.detalle}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(logs)}">
              <td colspan="8" style="text-align:center; color:var(--gray); padding:2rem">No hay logs</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
