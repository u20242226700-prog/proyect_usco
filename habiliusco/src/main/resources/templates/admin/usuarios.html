<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Usuarios - Admin HabiliUSCO</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-logo-circle">U</div>
      <div><div class="admin-brand">Habili<span>USCO</span></div><div class="admin-brand-sub">Panel Admin</div></div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">Principal</div>
      <a href="/admin" class="admin-nav-link">📊 Dashboard</a>
      <div class="admin-nav-section">Gestión</div>
      <a href="/admin/usuarios" class="admin-nav-link active">👥 Usuarios</a>
      <a href="/admin/servicios" class="admin-nav-link">🛠 Servicios</a>
      <a href="/admin/reservas" class="admin-nav-link">📅 Reservas</a>
      <div class="admin-nav-section">Sistema</div>
      <a href="/admin/logs" class="admin-nav-link">📋 Logs</a>
      <div class="admin-nav-section">Navegación</div>
      <a href="/portal" class="admin-nav-link">🏠 Portal</a>
      <a href="#" class="admin-nav-link" onclick="logout()">🚪 Salir</a>
    </nav>
  </div>
  <div class="admin-content">
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <h1 style="font-size:1.5rem; font-weight:900; margin-bottom:0.5rem">👥 Gestión de Usuarios</h1>
    <div class="gold-line" style="max-width:200px; margin-bottom:1.5rem"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Usuario</th><th>Email</th><th>Facultad</th><th>Roles</th><th>Estado</th><th>Registro</th><th>Acciones</th></tr></thead>
          <tbody>
            <tr th:each="u : ${usuarios}">
              <td>
                <div style="display:flex; align-items:center; gap:0.75rem">
                  <div style="width:36px; height:36px; border-radius:50%; overflow:hidden; background:var(--primary-light); border:2px solid var(--primary); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--primary)">
                    <img th:if="${u.fotoUrl != null}" th:src="${u.fotoUrl}" style="width:100%; height:100%; object-fit:cover">
                    <span th:unless="${u.fotoUrl != null}" th:text="${#strings.substring(u.nombreCompleto,0,1)}"></span>
                  </div>
                  <div>
                    <div style="font-weight:700" th:text="${u.nombreCompleto}"></div>
                    <div style="font-size:0.78rem; color:var(--gray)">@<span th:text="${u.username}"></span></div>
                  </div>
                </div>
              </td>
              <td style="font-size:0.875rem" th:text="${u.email}"></td>
              <td style="font-size:0.82rem" th:text="${u.facultad}"></td>
              <td>
                <div style="display:flex; gap:0.25rem; flex-wrap:wrap">
                  <span th:each="rol : ${u.roles}" class="category-badge" th:text="${rol}"></span>
                </div>
              </td>
              <td>
                <span class="status-badge" th:classappend="${u.activo} ? 'status-ACTIVO' : 'status-INACTIVO'"
                      th:text="${u.activo ? 'Activo' : 'Inactivo'}"></span>
              </td>
              <td style="font-size:0.8rem; color:var(--gray)" th:text="${u.fechaCreacion != null ? #temporals.format(u.fechaCreacion,'dd/MM/yy') : '-'}"></td>
              <td>
                <div style="display:flex; gap:0.4rem; flex-wrap:wrap">
                  <a th:href="@{/perfil/{u}(u=${u.username})}" class="btn btn-ghost btn-sm">👁 Ver</a>
                  <form th:action="@{/admin/usuarios/{id}/toggle(id=${u.id})}" method="post" style="display:inline">
                    <button class="btn btn-sm" th:classappend="${u.activo} ? 'btn-warning' : 'btn-success'"
                            th:text="${u.activo ? 'Desactivar' : 'Activar'}"></button>
                  </form>
                  <form th:action="@{/admin/usuarios/{id}/rol(id=${u.id})}" method="post" style="display:flex; gap:0.35rem">
                    <select name="rol" class="form-control" style="padding:0.25rem 0.5rem; font-size:0.78rem; height:auto; width:80px">
                      <option value="ADMIN">ADMIN</option>
                      <option value="USER">USER</option>
                    </select>
                    <button class="btn btn-outline-red btn-sm">Toggle</button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
