<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión - HabiliUSCO</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <img src="/images/usco-logo.png" alt="USCO" class="auth-logo-usco">
    <div class="auth-brand">Habili<span>USCO</span></div>
    <div class="auth-title">Bienvenido</div>
    <div class="auth-subtitle">Universidad Surcolombiana · Neiva, Huila</div>

    <div style="height:3px; background:linear-gradient(90deg,var(--primary),var(--gold)); border-radius:2px; margin:1.25rem 0"></div>

    <div th:if="${param.error}" class="alert alert-danger">
      ❌ Usuario o contraseña incorrectos
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
      ✅ Sesión cerrada correctamente
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label">👤 Usuario</label>
        <input type="text" name="username" class="form-control" placeholder="tu_usuario" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
        Iniciar Sesión
      </button>
    </form>

    <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--gray)">
      ¿No tienes cuenta? <a href="/registro" style="color:var(--primary); font-weight:700">Regístrate aquí</a>
    </p>

    <div style="margin-top:1rem; padding:0.85rem 1rem; background:var(--gold-light); border-radius:8px; font-size:0.78rem; color:var(--gold-dark); border:1px solid var(--gold); text-align:center">
      🔑 Demo: <strong>admin</strong> / <strong>123123</strong> &nbsp;|&nbsp; <strong>daniel</strong> / <strong>123456</strong>
    </div>
  </div>
</div>
</body>
</html>
