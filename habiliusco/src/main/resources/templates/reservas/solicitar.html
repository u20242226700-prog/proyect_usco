<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitar Reserva - HabiliUSCO</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a href="/portal" class="nav-brand">Habili<span>USCO</span></a>
    <div class="nav-links">
      <a href="/portal" class="nav-link">Explorar</a>
      <a href="/reservas/mis-reservas" class="nav-link">Reservas</a>
      <a href="#" class="btn btn-outline btn-sm" onclick="logout()">Salir</a>
    </div>
  </div>
</nav>
<div class="page-container" style="max-width:600px">
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="card">
    <div class="card-body">
      <h2 style="font-weight:800; margin-bottom:1.5rem">Solicitar reserva</h2>
      <form th:action="@{/reservas/solicitar}" method="post">
        <input type="hidden" name="servicioId" th:value="${servicioId}">
        <div class="form-group">
          <label class="form-label">Fecha deseada *</label>
          <input id="fechaReserva" name="fecha" type="date" class="form-control" required>
          <div id="dateHint" class="calendar-hint">Selecciona una fecha</div>
        </div>
        <div class="form-group">
          <label class="form-label">Precio que ofreces (COP)</label>
          <input name="precioPropuesto" type="number" class="form-control" placeholder="Ej: 50000" min="0" step="1000">
        </div>
        <div class="form-group">
          <label class="form-label">Mensaje</label>
          <textarea name="mensaje" class="form-control" rows="4" placeholder="Describe lo que necesitas..."></textarea>
        </div>
        <button type="submit" id="btnSolicitar" class="btn btn-primary btn-full btn-lg">Enviar solicitud</button>
      </form>
    </div>
  </div>
</div>
<script th:inline="javascript">
window.fechasOcupadas = /*[[${fechasOcupadas}]]*/ [];
</script>
<script src="/js/app.js"></script>
</body>
</html>
